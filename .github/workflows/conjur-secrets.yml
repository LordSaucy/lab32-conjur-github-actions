name: Conjur secret fetch (GitHub OIDC -> authn-jwt)

# DevSecOps pattern: the pipeline mints a short-lived GitHub OIDC JWT, exchanges it
# at Conjur's authn-jwt endpoint for a short-lived access token, retrieves the secret
# at run time, uses it, and proves nothing sensitive is stored in the repo.
# No long-lived Conjur API key is kept as a GitHub secret.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write      # required to mint the GitHub OIDC JWT
  contents: read

jobs:
  fetch-and-use-secret:
    runs-on: ubuntu-latest
    env:
      # Non-secret configuration lives in repo *Variables* (Settings > Variables), not Secrets.
      CONJUR_URL: ${{ vars.CONJUR_URL }}                       # https://conjur.example.com
      CONJUR_ACCOUNT: ${{ vars.CONJUR_ACCOUNT }}               # e.g. myorg
      CONJUR_SERVICE_ID: ${{ vars.CONJUR_AUTHN_JWT_SERVICE_ID }} # e.g. github
      CONJUR_VARIABLE_ID: ${{ vars.CONJUR_VARIABLE_ID }}       # e.g. github/db/password
    steps:
      - uses: actions/checkout@v4

      - name: Mint GitHub OIDC token (audience = conjur)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('conjur')
            core.setSecret(token)          // mask it in logs
            core.setOutput('jwt', token)

      - name: Authenticate to Conjur (authn-jwt) and fetch the secret
        id: conjur
        env:
          JWT: ${{ steps.oidc.outputs.jwt }}
        run: |
          set -euo pipefail
          # 1) exchange the OIDC JWT for a short-lived Conjur access token, base64 for the header
          access_token=$(curl -sf -X POST \
            --data-urlencode "jwt=${JWT}" \
            "${CONJUR_URL}/authn-jwt/${CONJUR_SERVICE_ID}/${CONJUR_ACCOUNT}/authenticate" \
            | base64 | tr -d '\r\n')
          echo "::add-mask::${access_token}"

          # 2) retrieve the secret value (the JWT-mapped host must be entitled in Conjur policy)
          var_enc=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['CONJUR_VARIABLE_ID'],safe=''))")
          secret=$(curl -sf \
            -H "Authorization: Token token=\"${access_token}\"" \
            "${CONJUR_URL}/secrets/${CONJUR_ACCOUNT}/variable/${var_enc}")
          echo "::add-mask::${secret}"

          # 3) hand it to later steps as a masked env var (never printed)
          echo "DB_PASSWORD=${secret}" >> "$GITHUB_ENV"
          echo "Fetched secret from Conjur at runtime (value masked); length=${#secret}"

      - name: Use the secret in the app (value is never printed)
        run: python3 app/consume_secret.py

      - name: Prove no secret at rest in the repository
        run: |
          set -euo pipefail
          if grep -RInE '(password|api[_-]?key|secret|token)[[:space:]]*[:=][[:space:]]*["'\'']?[A-Za-z0-9/+._-]{16,}' \
               --include='*.py' --include='*.env' --include='*.txt' \
               --exclude-dir='.git' --exclude-dir='.github' . ; then
            echo "::error::possible hard-coded secret found in repo"; exit 1
          fi
          echo "OK: no hard-coded secrets. The value came from Conjur at runtime via OIDC/JWT."
          echo "     No long-lived Conjur credential is stored in GitHub."
